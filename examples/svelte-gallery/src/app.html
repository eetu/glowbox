<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Static title/description/social cards: the app renders client-side only, so
		     this — not any component markup — is what crawlers and link unfurlers see.
		     (Routes override the title at runtime via <svelte:head>.) -->
		<title>glowbox — 3D LED-grid & nixie-tube displays</title>
		<meta
			name="description"
			content="Glowing display components you can install: a 3D WebGL LED grid you draw on like a tiny 3D canvas, and nixie-tube numerals — framework-agnostic cores with Svelte, React and Vue wrappers. Interactive demos: torus, strange attractor, 3D Pac-Man, a nixie clock and more."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:title" content="glowbox — 3D LED-grid & nixie-tube displays" />
		<meta
			property="og:description"
			content="A glowing 3D LED grid + nixie tubes as installable components, with live WebGL demos."
		/>
		<meta property="og:url" content="https://eetu.github.io/glowbox/" />
		<meta
			property="og:image"
			content="https://raw.githubusercontent.com/eetu/glowbox/main/media/hero.png"
		/>
		<meta name="twitter:card" content="summary_large_image" />

		<!-- Icons + install metadata. Touch devices (iOS home-screen) need a PNG
		     apple-touch-icon; the manifest covers Android/PWA install. -->
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon-32.png" sizes="32x32" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="glowbox" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
