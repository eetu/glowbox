name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: 'Lint / typecheck / test / build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .node-version
      # Yarn is vendored (.yarn/releases/*.cjs) and invoked via node — no corepack
      # (node 25+ dropped the bundle), so this stays node-version-agnostic.
      - name: Checks
        run: |
          yarn() { node .yarn/releases/yarn-*.cjs "$@"; }
          yarn install --immutable
          # WebGL browser tests (vitest) + the demo e2e (Playwright) need chromium;
          # the core's browser project also runs webkit (HDR-extension variance).
          # (bare `yarn <bin>` isn't a thing in Yarn 4; call the hoisted bin directly.)
          ./node_modules/.bin/playwright install --with-deps chromium webkit
          yarn lint
          yarn format
          # Build before typecheck: cross-package typecheck resolves @glowbox/* through each
          # package's published `dist` types (no source path-mapping), so core/nixie must be
          # built first — the build is topological (core → nixie → wrappers → extras).
          yarn build
          yarn typecheck
          yarn test
          # Bundle-size budgets (size-limit) — fails the build if a package bloats.
          yarn size
          # Publish-integrity smoke: pack all six → npm-install the tarballs into a
          # throwaway consumer → bare-node import + tsc against shipped .d.ts + browser
          # mount from dist. The only coverage of what npm users actually receive.
          node scripts/publish-smoke.mjs
