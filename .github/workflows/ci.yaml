name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: 'Lint / typecheck / test / build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
      # Yarn is vendored (.yarn/releases/*.cjs) and invoked via node — no corepack
      # (node 25+ dropped the bundle), so this stays node-version-agnostic.
      - name: Checks
        run: |
          yarn() { node .yarn/releases/yarn-*.cjs "$@"; }
          yarn install --immutable
          # WebGL browser tests (vitest) + the demo e2e (Playwright) both need chromium.
          # (bare `yarn <bin>` isn't a thing in Yarn 4; call the hoisted bin directly.)
          ./node_modules/.bin/playwright install --with-deps chromium
          yarn lint
          yarn format
          # Build before typecheck: cross-package typecheck resolves @glowbox/* through each
          # package's published `dist` types (no source path-mapping), so core/nixie must be
          # built first — the build is topological (core → nixie → wrappers → extras).
          yarn build
          yarn typecheck
          yarn test
          # Bundle-size budgets (size-limit) — fails the build if a package bloats.
          yarn size
